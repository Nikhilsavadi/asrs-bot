services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.unified
    container_name: asrs-bot
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
